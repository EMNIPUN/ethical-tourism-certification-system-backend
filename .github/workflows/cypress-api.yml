name: Cypress API Tests

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  cypress-api:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      NODE_ENV: test
      PORT: 5000
      MONGO_URI: mongodb://localhost:27017/ethical-tourism-e2e
      JWT_SECRET: test-secret
      JWT_EXPIRE: 30d
      JWT_COOKIE_EXPIRE: 30
      E2E_MOCK_MODE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start API server
        run: |
          npm run dev > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for API readiness
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:5000/api/v1 > /dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          cat server.log
          exit 1

      - name: Run Cypress API tests
        run: npm run cy:run:api

      - name: Run Cypress BDD tests
        run: npm run cy:run:bdd

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            cypress/reports/mochawesome
            cypress/screenshots
            cypress/videos
            server.log
